name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check backend/ tests/ scripts/
      - name: Unit + integration tests
        run: pytest -m "not e2e" -q

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt pytest-playwright
      - run: playwright install --with-deps chromium
      - name: Browse + full move flow
        run: pytest -m e2e -q
