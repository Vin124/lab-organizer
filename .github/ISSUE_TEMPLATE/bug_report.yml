name: Bug report
description: Something broke or behaved unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! **Security issues (path escapes, unconfirmed
        writes, overwrite bugs) should NOT be filed here** — use the Security
        tab instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
      placeholder: Dragged a folder onto its own subfolder and ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set LAB_ROOT=...
        2. Open Browse, expand ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v3 / main @ abc1234
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, how you run it (uvicorn / systemd / Docker)
      placeholder: Ubuntu 22.04, Python 3.11, Docker
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server output, browser console, or audit-log lines (redact paths if needed)
      render: text
